name: iOS Build & TestFlight

# Triggers identisch zum Android-Workflow
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # für GitHub-Release-Upload

# ─── Required GitHub Secrets ──────────────────────────────────────────────────
# IOS_CERTIFICATE_BASE64        — Apple Distribution .p12, base64-encoded
#                                 (openssl base64 -in cert.p12 | tr -d '\n')
# IOS_CERTIFICATE_PASSWORD      — Passwort des .p12-Zertifikats
# IOS_PROVISIONING_PROFILE_BASE64 — App Store Provisioning Profile (.mobileprovision),
#                                   base64-encoded
# IOS_PROVISIONING_PROFILE_NAME — Anzeigename des Profils (z.B. "FireRechner AppStore")
# APPLE_TEAM_ID                 — 10-stellige Apple Developer Team-ID
# ASC_API_KEY_BASE64            — App Store Connect API Key (.p8), base64-encoded
# ASC_API_KEY_ID                — Key-ID (z.B. "ABCDEF1234")
# ASC_API_ISSUER_ID             — Issuer-ID aus App Store Connect
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Web-Build ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: Disable code signing for CocoaPods targets
        run: |
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/App/Pods/Pods.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
              end
            end
            project.save
          "

      # ── 3. Code Signing ──────────────────────────────────────────────────────
      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          # Add to search list so xcodebuild can find it
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

      - name: Import distribution certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | openssl base64 -d -A > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

      - name: Install provisioning profile
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | openssl base64 -d -A > "${PROFILE_PATH}"
          # Lese UUID aus dem Profil
          UUID=$(security cms -D -i "${PROFILE_PATH}" | \
            plutil -extract UUID raw -)
          echo "PROVISIONING_PROFILE_UUID=${UUID}" >> "$GITHUB_ENV"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "${PROFILE_PATH}" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}.mobileprovision"

      # ── 4. App Store Connect API Key ────────────────────────────────────────
      - name: Set up App Store Connect API key
        run: |
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8"
          echo "${{ secrets.ASC_API_KEY_BASE64 }}" | openssl base64 -d -A > "${ASC_KEY_PATH}"
          echo "ASC_KEY_PATH=${ASC_KEY_PATH}" >> "$GITHUB_ENV"

      # ── 5. ExportOptions plists ──────────────────────────────────────────────
      - name: Create ExportOptions plists
        run: |
          TEAM="${{ secrets.APPLE_TEAM_ID }}"
          # Use UUID (already installed) instead of display name to avoid lookup failures
          PROFILE="${PROVISIONING_PROFILE_UUID}"

          for DEST in export upload; do
            cat > "$RUNNER_TEMP/ExportOptions-${DEST}.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>${DEST}</string>
            <key>teamID</key><string>${TEAM}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key><dict>
              <key>de.scheub.localNotes</key><string>${PROFILE}</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          done

      # ── 6. Xcode Build & Archive ─────────────────────────────────────────────
      - name: Build Xcode archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FireRechner.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${PROVISIONING_PROFILE_UUID}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            archive

      # ── 7. IPA exportieren ───────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FireRechner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-export.plist" \
            -exportPath "$RUNNER_TEMP/export"
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp "$RUNNER_TEMP/export/App.ipa" "fireCalculator-${VERSION}.ipa"
          echo "IPA_PATH=fireCalculator-${VERSION}.ipa" >> "$GITHUB_ENV"

      # ── 8. TestFlight Upload ─────────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FireRechner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-upload.plist" \
            -exportPath "$RUNNER_TEMP/upload" \
            -authenticationKeyPath "${ASC_KEY_PATH}" \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      # ── 9. GitHub Release ────────────────────────────────────────────────────
      - name: Upload IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false   # Android-Job schreibt die Notes
          files: ${{ env.IPA_PATH }}

      # ── 10. Aufräumen ────────────────────────────────────────────────────────
      - name: Remove temporary keychain
        if: always()
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true